<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mebius Code</title>
    <script>
      (() => {
        let theme = 'dark';
        try {
          theme = localStorage.getItem('mebius.theme') === 'light' ? 'light' : 'dark';
        } catch {
          theme = 'dark';
        }
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
