name: mebius-code

services:
  api:
    build:
      context: ./backend
    container_name: mebius-code-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: mebius
      DATABASE_PASSWORD: mebius_dev_password
      DATABASE_NAME: mebius_code
      DATABASE_SYNCHRONIZE: "true"
      JWT_SECRET: replace-with-a-long-random-production-secret
      JWT_EXPIRES_IN: 7d
      MAIL_ENABLED: "false"
      MAIL_APP_NAME: Mebius Code
      MAIL_FROM: "Mebius Code <no-reply@example.com>"
      SMTP_HOST: smtp-relay.brevo.com
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_USER: replace-with-brevo-smtp-login
      SMTP_PASS: replace-with-brevo-smtp-key
      MEBIUS_CODE_MASTER_KEY: replace-with-a-32-byte-or-longer-production-secret
      MEBIUS_CODE_WORKSPACE_ROOT: /app/workspaces
      MEBIUS_CODE_COMMAND_ALLOWLIST: git status,git diff,git log,npm test,npm run test,npm run build,npm run lint,node --version,npm --version
    ports:
      - "3000:3000"
    volumes:
      - mebius-code-workspaces:/app/workspaces

  postgres:
    image: postgres:16-alpine
    container_name: mebius-code-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mebius_code
      POSTGRES_USER: mebius
      POSTGRES_PASSWORD: mebius_dev_password
    ports:
      - "5432:5432"
    volumes:
      - mebius-code-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mebius -d mebius_code"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mebius-code-postgres:
  mebius-code-workspaces:
